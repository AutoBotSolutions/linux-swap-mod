<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#050508;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2cbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg-gradient)"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1500" height="500" fill="url(#grid)"/>
  
  <!-- Tech Elements -->
  <circle cx="200" cy="250" r="80" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="250" r="60" fill="none" stroke="#7b2cbf" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="250" r="40" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.3"/>
  
  <circle cx="1300" cy="250" r="80" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3"/>
  <circle cx="1300" cy="250" r="60" fill="none" stroke="#7b2cbf" stroke-width="2" opacity="0.3"/>
  <circle cx="1300" cy="250" r="40" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.3"/>
  
  <!-- Main Title -->
  <text x="750" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#text-gradient)" filter="url(#glow)">
    LINUX SWAP OPTIMIZER
  </text>
  
  <!-- Subtitle -->
  <text x="750" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#00f0ff" opacity="0.8">
    Advanced System Optimization for AI Workloads
  </text>
  
  <!-- Features -->
  <text x="750" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" opacity="0.7">
    ⚙️ 5-Tier Priority System | 💻 AI Workload Optimization | 🔌 Systemd Integration
  </text>
  
  <!-- Stats -->
  <text x="750" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#7b2cbf" font-weight="bold">
    60% CPU Reduction | 40% Memory Efficiency | 24/7 Active
  </text>
  
  <!-- GitHub Link -->
  <text x="750" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ff006e">
    github.com/AutoBotSolutions/linux-swap-mod
  </text>
  
  <!-- Decorative Lines -->
  <line x1="100" y1="450" x2="1400" y2="450" stroke="url(#text-gradient)" stroke-width="3" opacity="0.5"/>
  <line x1="100" y1="50" x2="1400" y2="50" stroke="url(#text-gradient)" stroke-width="3" opacity="0.5"/>
</svg>
