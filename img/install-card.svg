<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="install-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="install-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
    </linearGradient>
    <filter id="install-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="20" fill="url(#install-bg)" stroke="url(#install-gradient)" stroke-width="2"/>
  
  <!-- Icon -->
  <text x="300" y="100" text-anchor="middle" font-size="80">🔌</text>
  
  <!-- Title -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00f0ff" filter="url(#install-glow)">
    QUICK INSTALLATION
  </text>
  
  <!-- Steps -->
  <rect x="50" y="190" width="500" height="140" rx="10" fill="#050508" stroke="#7b2cbf" stroke-width="1"/>
  
  <text x="70" y="220" font-family="Arial, sans-serif" font-size="14" fill="#00f0ff">1. git clone linux-swap-mod.git</text>
  <text x="70" y="245" font-family="Arial, sans-serif" font-size="14" fill="#00f0ff">2. cd linux-swap-mod</text>
  <text x="70" y="270" font-family="Arial, sans-serif" font-size="14" fill="#00f0ff">3. sudo bash install.sh</text>
  <text x="70" y="295" font-family="Arial, sans-serif" font-size="14" fill="#00f0ff">4. sudo systemctl start swap-optimizer</text>
  <text x="70" y="320" font-family="Arial, sans-serif" font-size="14" fill="#ff006e" font-weight="bold">✓ Ready in 2 minutes!</text>
  
  <!-- Bottom Text -->
  <text x="300" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.7">
    Works on Ubuntu, Debian, Fedora, Arch
  </text>
  
  <!-- Bottom Accent -->
  <line x1="50" y1="380" x2="550" y2="380" stroke="url(#install-gradient)" stroke-width="2" opacity="0.5"/>
</svg>
