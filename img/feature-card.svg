<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050508;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:1" />
    </linearGradient>
    <filter id="card-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card Background -->
  <rect width="600" height="400" rx="20" fill="url(#card-bg)" stroke="url(#accent-gradient)" stroke-width="2"/>
  
  <!-- Icon -->
  <text x="300" y="100" text-anchor="middle" font-size="80">⚙️</text>
  
  <!-- Title -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00f0ff" filter="url(#card-glow)">
    5-TIER PRIORITY SYSTEM
  </text>
  
  <!-- Description -->
  <text x="300" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.8">
    Advanced process categorization
  </text>
  <text x="300" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.8">
    AI • IDE • Interactive • Normal • Background
  </text>
  
  <!-- Stats -->
  <rect x="150" y="270" width="300" height="80" rx="10" fill="#050508" stroke="#7b2cbf" stroke-width="1"/>
  <text x="300" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#7b2cbf">
    5 Priority Tiers
  </text>
  <text x="300" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#00f0ff">
    Optimized CPU & I/O Allocation
  </text>
  
  <!-- Bottom Accent -->
  <line x1="50" y1="370" x2="550" y2="370" stroke="url(#accent-gradient)" stroke-width="2" opacity="0.5"/>
</svg>
